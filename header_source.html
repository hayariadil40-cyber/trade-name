        <!-- ==============================================
             HEADER UNIVERSALE
             ============================================== -->
        <header class="flex justify-between items-center px-8 py-5 border-b border-tp-border bg-tp-panel shadow-md z-10 flex-shrink-0 w-full relative">
            
            <!-- 1. LEFT: Page Title & Quick Actions -->
            <div class="flex items-center gap-4 w-auto min-w-max">
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-white mb-1" id="page-global-title">{TITLE}</h1>
                    <div class="flex gap-2.5 mt-1">
                        <a href="analisi.html" class="flex items-center gap-1.5 text-[10px] font-bold px-2 py-1 rounded bg-tp-accent/10 border border-tp-accent/50 text-tp-accent hover:bg-tp-accent hover:text-[#0a0c10] transition-colors"><i data-lucide="bar-chart-2" class="w-3.5 h-3.5"></i> Trade Analisi</a>
                        <a href="tabella_trades.html" class="flex items-center gap-1.5 text-[10px] font-bold px-2 py-1 rounded bg-tp-bg text-tp-muted border border-tp-border hover:bg-tp-border hover:text-white transition-colors"><i data-lucide="crosshair" class="w-3.5 h-3.5"></i> Tabella Trades</a>
                        <a href="giornaliero.html" class="flex items-center gap-1.5 text-[10px] font-bold px-2 py-1 rounded bg-tp-bg text-tp-muted border border-tp-border hover:bg-tp-border hover:text-white transition-colors"><i data-lucide="calendar" class="w-3.5 h-3.5"></i> Giornaliero</a>
                    </div>
                </div>
            </div>

            <!-- 2. CENTER: Timeline (Cronoprogramma) -->
            <div class="hidden lg:flex items-center flex-1 max-w-3xl mx-8 gap-6">
                <!-- Digital Clock & TFs -->
                <div class="flex flex-col items-center justify-center shrink-0">
                    <span id="digital-clock" class="text-xl font-display font-bold text-white tracking-widest tabular-nums leading-none">00:00:00</span>
                    <div class="flex gap-1 mt-1.5">
                        <span id="tf-5m" class="px-1.5 py-0.5 text-[9px] font-bold bg-tp-panel rounded text-tp-muted transition-colors">5m</span>
                        <span id="tf-15m" class="px-1.5 py-0.5 text-[9px] font-bold bg-tp-panel rounded text-tp-muted transition-colors">15m</span>
                        <span id="tf-30m" class="px-1.5 py-0.5 text-[9px] font-bold bg-tp-panel rounded text-tp-muted transition-colors">30m</span>
                        <span id="tf-1h" class="px-1.5 py-0.5 text-[9px] font-bold bg-tp-panel rounded text-tp-muted transition-colors">1h</span>
                        <span id="tf-4h" class="px-1.5 py-0.5 text-[9px] font-bold bg-tp-panel rounded text-tp-muted transition-colors">4h</span>
                    </div>
                </div>

                <!-- Timeline Container -->
                <div class="flex-col flex-1 relative w-full mx-4">
                    <div class="flex justify-between text-[10px] items-end font-bold uppercase tracking-widest mb-2 px-2">
                        <span class="text-tp-muted opacity-30">Asia</span>
                        <span class="text-tp-muted opacity-60">London</span>
                        <span class="text-white drop-shadow-[0_0_5px_rgba(255,255,255,0.8)] scale-110 origin-bottom transition-all">New York (14-17)</span>
                        <span class="text-tp-muted opacity-30">End</span>
                    </div>
                    <!-- Track Base futuristic gradient -->
                    <div class="h-2 w-full bg-gradient-to-r from-tp-bg via-tp-border to-tp-bg rounded-full border border-tp-border/30 relative shadow-inner">
                        <!-- Progress Fill glowing gradient -->
                        <div id="timeline-progress" class="absolute left-0 top-0 bottom-0 bg-gradient-to-r from-teal-600 via-tp-accent to-[#22d3ee] rounded-full shadow-[0_0_10px_rgba(32,201,151,0.5)]" style="width: 45%;"></div>
                        <!-- Time Cursor Dot Glowing -->
                        <div id="timeline-dot" class="timeline-cursor absolute top-1/2 -ml-2.5 -mt-2.5 w-5 h-5 bg-white rounded-full border-[3px] border-tp-accent shadow-[0_0_15px_rgba(32,201,151,0.9)] z-10" style="left: 45%;"></div>
                        <!-- Mock Markers -->
                        <div class="absolute left-[30%] top-0 bottom-0 w-px bg-tp-border/50"></div>
                        <div class="absolute left-[50%] top-0 bottom-0 w-px bg-tp-border/50"></div>
                        <div class="absolute left-[70%] top-0 bottom-0 w-px bg-tp-border/50"></div>
                        <!-- Current Time Glowing Line marker -->
                        <div class="absolute left-[45%] -top-1 -bottom-1 w-[2px] bg-tp-text/20 rounded-full blur-[1px]"></div>
                    </div>
                </div>
            </div>

            <!-- 3. RIGHT: Indicators + Win Rate -->
            <div class="flex items-center gap-4 w-auto shrink-0 justify-end">
                <div class="hidden xl:flex items-center gap-6 bg-gradient-to-b from-[#13161c] to-[#0a0c10] border border-tp-border/40 px-6 py-3 rounded-2xl shadow-inner h-16 mr-4">
                    <div class="flex flex-col items-center gap-1 group relative w-10">
                        <i id="mindset-icon-wrapper" data-lucide="smile" class="w-7 h-7 text-tp-accent transition-all duration-300 transform drop-shadow-md"></i>
                    </div>
                    <div class="w-px h-8 bg-gradient-to-b from-transparent via-tp-border to-transparent"></div>
                    <div class="flex flex-col items-center gap-1 group relative w-10">
                        <i id="market-icon-wrapper" data-lucide="smile" class="w-7 h-7 text-tp-accent transition-all duration-300 transform drop-shadow-md"></i>
                    </div>
                    <div class="w-px h-8 bg-gradient-to-b from-transparent via-tp-border to-transparent"></div>
                    <div class="flex flex-col items-center gap-1 group relative w-10">
                        <i id="volatility-icon-wrapper" data-lucide="dollar-sign" class="w-7 h-7 text-tp-accent drop-shadow-[0_0_12px_rgba(32,201,151,0.8)] transition-all duration-300 transform"></i>
                    </div>
                </div>
                <!-- Win Rate Invasivo e Tecnologico -->
                <div class="flex items-center gap-3 text-right bg-[#0a0c10]/50 px-4 py-2 border border-tp-accent/20 rounded-[1.25rem] shadow-[0_0_15px_rgba(32,201,151,0.05)]">
                    <div class="flex flex-col">
                        <span class="text-[9px] text-tp-accent font-bold uppercase tracking-widest opacity-80">Win Rate</span>
                        <span class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-tp-accent to-white drop-shadow-[0_0_8px_rgba(32,201,151,0.6)] leading-none mt-0.5">67%</span>
                    </div>
                    <!-- Anello neon -->
                    <div class="relative w-10 h-10 flex items-center justify-center">
                        <svg class="w-[120%] h-[120%] transform -rotate-90 overflow-visible absolute" viewBox="0 0 36 36">
                            <path class="text-tp-border" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-width="3" />
                            <path class="text-tp-accent drop-shadow-[0_0_4px_rgba(32,201,151,0.8)]" stroke-dasharray="67, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" />
                        </svg>
                    </div>
                </div>
            </div>
        </header>
