    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            lucide.createIcons();
            if (!db) return;
            await loadTrades();
        });

        async function loadTrades() {
            const { data, error } = await db.from('trades').select('*').order('data', { ascending: false });
            if (error) { console.error(error); return; }
            const list = document.getElementById('trades-list');
            const empty = document.getElementById('trades-empty');
            const count = document.getElementById('trade-count');

            if (!data || !data.length) { empty.classList.remove('hidden'); count.textContent = '0 trades'; return; }
            empty.classList.add('hidden');
            count.textContent = `${data.length} trade${data.length === 1 ? '' : 's'}`;

            list.innerHTML = data.map(t => {
                const isWin = t.esito === 'win';
                const isLoss = t.esito === 'loss';
                const barColor = isWin ? 'bg-tp-accent' : isLoss ? 'bg-tp-loss' : 'bg-tp-border';
                const hoverColor = isWin ? 'hover:border-tp-accent/50' : isLoss ? 'hover:border-tp-loss/50' : 'hover:border-white/50';
                const nameColor = isWin ? 'group-hover:text-tp-accent' : isLoss ? 'group-hover:text-tp-loss' : 'group-hover:text-white';
                const dirColor = t.direzione === 'LONG' ? 'text-tp-accent bg-[#14231f] border-tp-accent/20' : 'text-tp-loss bg-tp-loss/10 border-tp-loss/20';
                const pnlColor = (t.pnl||0) >= 0 ? 'text-tp-accent' : 'text-tp-loss';
                const pnlSign = (t.pnl||0) >= 0 ? '+' : '';
                const stato = t.stato || 'nuovo';
                const statoBadge = stato === 'completato' ? '<span class="text-[9px] px-2 py-0.5 rounded bg-tp-accent/10 text-tp-accent border border-tp-accent/20 font-bold uppercase">Completato</span>' : '<span class="text-[9px] px-2 py-0.5 rounded bg-tp-warning/10 text-tp-warning border border-tp-warning/20 font-bold uppercase">Da lavorare</span>';
                const dateStr = t.data ? new Date(t.data).toLocaleDateString('it-IT', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }) : '--';

                return `<div onclick="window.location.href='dettaglio_trade.html?id=${t.id}'" class="group flex items-center p-4 bg-tp-panel border border-tp-border ${hoverColor} rounded-lg transition-all cursor-pointer shadow-sm relative overflow-hidden">
                    <div class="w-1 absolute left-0 top-0 bottom-0 ${barColor}"></div>
                    <div class="flex items-center w-1/5 pl-3 gap-3"><span class="text-xs font-bold text-tp-muted bg-tp-bg px-2 py-1 rounded">${t.id.substring(0,8)}</span><span class="font-bold text-lg ${nameColor} transition-colors">${t.asset||'--'}</span></div>
                    <div class="w-1/5 flex items-center gap-2"><span class="text-xs font-bold ${dirColor} border px-2 py-0.5 rounded uppercase">${t.direzione||'--'}</span><span class="text-xs font-bold text-tp-muted">${t.size||''} L</span></div>
                    <div class="w-1/5 flex items-center gap-2"><span class="bg-blue-500/10 text-blue-400 border border-blue-500/30 px-2 py-0.5 rounded text-[10px] font-bold uppercase">${t.sorgente||'--'}</span>${statoBadge}</div>
                    <div class="w-1/5 text-xs text-tp-muted">${dateStr}</div>
                    <div class="w-1/5 flex items-center justify-end gap-4 pr-4"><span class="text-sm font-bold ${pnlColor}">${pnlSign}$${Math.abs(t.pnl||0).toFixed(0)}</span><i data-lucide="chevron-right" class="w-4 h-4 text-tp-muted"></i></div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }
    </script>
</body>
</html>
